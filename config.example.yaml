hardware:
  mode: mac        # mac | pi
  camera_enabled: true
  mic_enabled: true
  speaker_enabled: true

recognition:
  threshold: 0.6   # euclidean distance; lower = stricter match. Tune per-install.

greetings:
  known:
    - "Hi, {name}!"
    - "Welcome back, {name}!"
    - "Hey {name}, good to see you!"
  unknown:
    - "Hi there!"
    - "Hello!"
  cooldown_seconds: 90   # don't re-greet the same person (or "unknown") more often than this
